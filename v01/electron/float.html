<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>ai-helper</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      #bar {
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #ffffff;
        border-bottom: 1px solid #eaecef;
        -webkit-app-region: drag;
        padding: 0 4px 0 12px;
        user-select: none;
      }
      #bar .title { font-size: 13px; color: #1f2329; }
      #bar .btns { display: flex; gap: 2px; -webkit-app-region: no-drag; }
      #bar button {
        width: 30px; height: 26px; border: 0; background: transparent;
        border-radius: 6px; cursor: pointer; color: #5c6370;
        display: flex; align-items: center; justify-content: center;
        font-size: 15px; line-height: 1; padding: 0;
      }
      #bar button:hover { background: #f1f2f4; }
      #bar button svg { width: 15px; height: 15px; display: block; }
      /* 图钉:置顶时高亮蓝 */
      #pin.on { color: #3b82f6; background: #e8f0fe; }
      #close:hover { background: #f7d7d7; color: #c0392b; }
      #wrap { position: absolute; top: 36px; left: 0; right: 0; bottom: 0; }
      webview { width: 100%; height: 100%; border: 0; display: inline-flex; }
      #load {
        position: absolute; inset: 36px 0 0 0; display: flex;
        align-items: center; justify-content: center;
        color: #8a9099; font-size: 13px; background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <span class="title">ai-helper</span>
      <span class="btns">
        <button id="pin" title="置顶 / 取消置顶">
          <svg viewBox="0 0 10 10" aria-hidden="true"><path fill="currentColor" d="M6.16739 1.90004H3.83264C3.80235 1.90004 3.7872 1.90004 3.77441 1.90086C3.57367 1.91374 3.41371 2.07369 3.40084 2.27443C3.40002 2.28722 3.40002 2.30237 3.40002 2.33266C3.40002 2.35213 3.40002 2.36186 3.40042 2.37088C3.40668 2.50932 3.48414 2.63465 3.60516 2.70216C3.61305 2.70656 3.62175 2.71091 3.63916 2.71961L3.70002 2.75004C3.77624 2.78815 3.81435 2.8072 3.84562 2.83154C3.92137 2.89046 3.97341 2.97466 3.99224 3.06877C4.00002 3.10763 4.00002 3.15023 4.00002 3.23545V3.96684C4.00002 4.07052 4.00002 4.12236 3.98829 4.16972C3.97071 4.24068 3.93403 4.30546 3.88223 4.35703C3.84765 4.39146 3.8032 4.41813 3.7143 4.47147L3.50251 4.59854C3.48603 4.60843 3.47779 4.61338 3.47015 4.61815C3.18312 4.79748 3.00628 5.10982 3.00018 5.4482C3.00002 5.45722 3.00002 5.46683 3.00002 5.48604C3.00002 5.49904 3.00002 5.50554 3.00017 5.51103C3.006 5.72333 3.17673 5.89405 3.38902 5.89989C3.39452 5.90004 3.40102 5.90004 3.41401 5.90004L3.80597 5.90004C4.11739 5.90004 4.2731 5.90004 4.38189 5.98554C4.39741 5.99774 4.41201 6.01107 4.42557 6.02542C4.52056 6.12603 4.53466 6.2811 4.56285 6.59123L4.67285 7.80127C4.68824 7.97048 4.83011 8.10004 5.00002 8.10004C5.16992 8.10004 5.31179 7.97048 5.32718 7.80127L5.43718 6.59123C5.46537 6.2811 5.47947 6.12603 5.57447 6.02542C5.58802 6.01107 5.60262 5.99774 5.61814 5.98554C5.72694 5.90004 5.88264 5.90004 6.19406 5.90004L6.58602 5.90004C6.59901 5.90004 6.60551 5.90004 6.61101 5.89989C6.8233 5.89405 6.99403 5.72333 6.99986 5.51103C7.00002 5.50554 7.00002 5.49904 7.00002 5.48604C7.00002 5.46683 7.00002 5.45722 6.99985 5.4482C6.99375 5.10982 6.81691 4.79748 6.52989 4.61815C6.52224 4.61338 6.514 4.60843 6.49752 4.59854L6.28573 4.47147C6.19683 4.41813 6.15238 4.39146 6.1178 4.35703C6.066 4.30546 6.02932 4.24068 6.01175 4.16972C6.00002 4.12236 6.00002 4.07052 6.00002 3.96684V3.23545C6.00002 3.15023 6.00002 3.10763 6.00779 3.06877C6.02662 2.97466 6.07866 2.89046 6.15441 2.83154C6.18569 2.8072 6.2238 2.78815 6.30002 2.75004L6.36087 2.71961C6.37828 2.71091 6.38698 2.70656 6.39487 2.70216C6.51589 2.63465 6.59335 2.50932 6.59961 2.37088C6.60002 2.36186 6.60002 2.35213 6.60002 2.33266C6.60002 2.30237 6.60002 2.28722 6.5992 2.27443C6.58632 2.07369 6.42637 1.91374 6.22562 1.90086C6.21283 1.90004 6.19769 1.90004 6.16739 1.90004Z"/></svg>
        </button>
        <button id="min" title="最小化到托盘">—</button>
        <button id="close" title="关闭到托盘">×</button>
      </span>
    </div>
    <div id="wrap">
      <webview id="wv" src="http://127.0.0.1:6185/"></webview>
    </div>
    <div id="load">正在连接…</div>

    <script>
      const wv = document.getElementById("wv");
      const load = document.getElementById("load");
      const pin = document.getElementById("pin");

      // 跳到 /chatbox:在页面内持续重试(等 SPA 挂载),history/hash 两种模式都试。
      // 一旦 URL 落到 chatbox 就停。注入脚本自带 interval,不依赖外部计时。
      function goChat() {
        try {
          wv.executeJavaScript(
            "(function(){if(window.__aihNav)return;window.__aihNav=1;var n=0;" +
            "var t=setInterval(function(){n++;" +
            "if(location.pathname.indexOf('/chatbox')===0||location.hash.indexOf('/chatbox')>=0){clearInterval(t);return;}" +
            "try{history.pushState({},'','/chatbox');window.dispatchEvent(new PopStateEvent('popstate'));}catch(e){}" +
            "if(location.pathname.indexOf('/chatbox')!==0&&n>=4){try{location.hash='#/chatbox';}catch(e){}}" +
            "if(n>40)clearInterval(t);},350);})();"
          ).catch(function () {});
        } catch (e) {}
      }

      // 注入 CSS 隐掉聊天页自带的会话侧栏,只留对话区 → 真·纯聊天
      function purify() {
        try {
          wv.insertCSS(
            ".chat-sidebar,.col-session,.folder-sidebar,.mini-sidebar," +
            ".session-list,.sidebar-toggle{display:none !important}"
          ).catch(function () {});
        } catch (e) {}
      }

      wv.addEventListener("did-finish-load", function () {
        load.style.display = "none";
        purify();
        goChat();
      });

      // —— 临时诊断:把 webview 当前路径显示在标题栏,并打开 DevTools 看报错 ——
      const titleEl = document.querySelector("#bar .title");
      function showPath() {
        try {
          const u = new URL(wv.getURL());
          titleEl.textContent = "ai-helper  " + (u.pathname + u.hash);
        } catch (e) {}
      }
      wv.addEventListener("did-navigate", showPath);
      wv.addEventListener("did-navigate-in-page", showPath);
      wv.addEventListener("dom-ready", function () {
        showPath();
        try { wv.openDevTools(); } catch (e) {}
      });
      wv.addEventListener("did-fail-load", function (e) {
        if (e.errorCode === -3) return;
        load.style.display = "flex";
        load.textContent = "正在连接后端…";
        setTimeout(function () { try { wv.reload(); } catch (_) {} }, 1200);
      });

      pin.onclick = async function () {
        const on = await window.aihFloat.togglePin();
        pin.classList.toggle("on", on);
      };
      document.getElementById("min").onclick = function () { window.aihFloat.minimize(); };
      document.getElementById("close").onclick = function () { window.aihFloat.close(); };
      window.aihFloat.getPin().then(function (on) { pin.classList.toggle("on", !!on); });
    </script>
  </body>
</html>
