<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>ai-helper 启动中</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0f1115;
        color: #e7e9ee;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
      }
      .title {
        font-size: 18px;
        letter-spacing: 1px;
        opacity: 0.92;
      }
      .hint {
        font-size: 12.5px;
        opacity: 0.55;
        max-width: 360px;
        text-align: center;
        line-height: 1.6;
      }
      .ring {
        width: 38px;
        height: 38px;
        border: 3px solid rgba(255, 255, 255, 0.12);
        border-top-color: #6aa9ff;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="ring"></div>
      <div class="title">ai-helper 正在启动…</div>
      <div class="hint">
        首次启动需要拉 dashboard 静态资源(约 10 MB),之后启动会快得多。
      </div>
    </div>
  </body>
</html>
